<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book A Session</title>
  <link type="img/jpeg" href="images/cam.jpeg" rel="icon">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      font-family: "Poppins", sans-serif;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --active:      rgb(247, 167, 19);
      --active-dark: rgb(241, 161, 10);
      --white:       #ffffff;
      --bg-dark:     #0b0b1a;
      --card-bg:     #1b1b2f;
      --input-bg:    #2a2a40;
    }

    html { scroll-behavior: smooth; }

    body {
      min-height: 100vh;
      background-image: url('./images/form1.jpeg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      display: flex;
      flex-direction: column;
    }

    /* Dark overlay so the bg image doesn't fight the form */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(8, 8, 20, 0.72);
      z-index: 0;
    }

    /* ===== HEADER / BACK LINK ===== */
    .site-header {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 6%;
      background: rgba(11, 11, 26, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(247, 167, 19, 0.2);
    }

    .site-header .logo {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--active);
      text-decoration: none;
    }

    .back-link {
      color: #ccc;
      text-decoration: none;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.3s;
    }
    .back-link:hover { color: var(--active); }
    .back-link svg {
      width: 16px; height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ===== MAIN BOOKING SECTION ===== */
    .booking-section {
      position: relative;
      z-index: 1;
      flex: 1;
      padding: clamp(40px, 8vw, 90px) 6%;
      color: var(--white);
      text-align: center;
    }

    .booking-section h2 {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      color: var(--active);
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    .booking-subtitle {
      color: #bbb;
      font-size: clamp(0.9rem, 2vw, 1rem);
      margin-bottom: clamp(24px, 5vw, 44px);
    }

    /* ===== FORM CARD ===== */
    .booking-form {
      max-width: 680px;
      margin: 0 auto;
      background: var(--card-bg);
      padding: clamp(24px, 5vw, 48px);
      border-radius: 20px;
      box-shadow: 0 0 40px rgba(255, 165, 0, 0.15), 0 8px 32px rgba(0,0,0,0.4);
      border: 1px solid rgba(247, 167, 19, 0.12);
      text-align: left;
    }

    /* Two-column grid for name + email on wider screens */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0 20px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: var(--active-dark);
      font-weight: 500;
      font-size: 0.92rem;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 13px 16px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.06);
      outline: none;
      background: var(--input-bg);
      color: var(--white);
      font-size: 0.95rem;
      transition: box-shadow 0.3s ease, border-color 0.3s ease, transform 0.25s ease;
      -webkit-appearance: none;
      appearance: none;
    }

    .form-group input::placeholder,
    .form-group textarea::placeholder {
      color: #666;
    }

    /* Colour the date picker icon white on Chrome */
    .form-group input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(1) opacity(0.5);
      cursor: pointer;
    }

    /* Style the select arrow */
    .select-wrap {
      position: relative;
    }
    .select-wrap::after {
      content: "";
      pointer-events: none;
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      border: 5px solid transparent;
      border-top-color: var(--active);
    }
    .select-wrap select {
      padding-right: 38px;
      cursor: pointer;
    }
    .select-wrap select option { background: #1b1b2f; }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: rgba(247, 167, 19, 0.5);
      box-shadow: 0 0 12px rgba(247, 167, 19, 0.25);
      transform: scale(1.01);
    }

    .form-group textarea { resize: vertical; min-height: 110px; }

    /* ===== SUBMIT BUTTON ===== */
    .btn-wrap {
      text-align: center;
      margin-top: 8px;
    }

    .book-btn {
      background-color: var(--active);
      color: #111;
      border: none;
      padding: 15px 48px;
      border-radius: 50px;
      cursor: pointer;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.5px;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      width: 100%;
      max-width: 280px;
    }

    .book-btn::before {
      content: "";
      position: absolute;
      inset: -5px;
      background: var(--active);
      border-radius: 50px;
      filter: blur(14px);
      opacity: 0;
      transition: opacity 0.3s;
      z-index: -1;
    }
    .book-btn:hover::before { opacity: 0.7; }
    .book-btn:hover {
      background-color: var(--white);
      color: var(--active);
      box-shadow: 0 0 18px rgba(247, 167, 19, 0.45);
    }
    .book-btn:active { transform: scale(0.97); }

    /* ===== SUCCESS TOAST ===== */
    .toast {
      display: none;
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--active);
      color: #111;
      padding: 14px 32px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 0.95rem;
      z-index: 9999;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      opacity: 0;
      transition: opacity 0.4s ease, transform 0.4s ease;
      white-space: nowrap;
      max-width: 90vw;
      text-align: center;
    }
    .toast.show {
      display: block;
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ===== TABLET ≤ 768px ===== */
    @media (max-width: 768px) {
      .form-grid {
        grid-template-columns: 1fr;
      }
      .booking-form {
        border-radius: 16px;
      }
    }

    /* ===== SMALL PHONES ≤ 480px ===== */
    @media (max-width: 480px) {
      .site-header { padding: 14px 5%; }
      .site-header .logo { font-size: 18px; letter-spacing: 2px; }
      .booking-section { padding: 30px 4%; }
      .booking-form { border-radius: 14px; }
      .book-btn { max-width: 100%; padding: 14px 30px; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="site-header">
    <a href="index.html" class="logo">Portfolio</a>
    <a href="index.html" class="back-link">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      Back to Portfolio
    </a>
  </header>

  <!-- Booking Section -->
  <section id="booking" class="booking-section">
    <h2>Book A Photography Session</h2>
    <p class="booking-subtitle">Let's capture your special moments together!</p>

    <form class="booking-form" action="#" method="post" onsubmit="return submitForm(event)">

      <div class="form-grid">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" placeholder="Enter your full name" required>
        </div>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="Enter your email" required>
        </div>
      </div>

      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone" placeholder="Enter your phone number">
      </div>

      <div class="form-group">
        <label for="session">Session Type</label>
        <div class="select-wrap">
          <select id="session" name="session" required>
            <option value="" disabled selected>Select Session Type</option>
            <option value="portrait">Portrait Photography</option>
            <option value="travel">Travel Photography</option>
            <option value="wildlife">Wildlife Photography</option>
            <option value="aerial">Aerial / Drone Photography</option>
            <option value="event">Event / Wedding Photography</option>
          </select>
        </div>
      </div>

      <div class="form-grid">
        <div class="form-group">
          <label for="date">Preferred Date</label>
          <input type="date" id="date" name="date" required>
        </div>
        <div class="form-group">
          <label for="location">Location / City</label>
          <input type="text" id="location" name="location" placeholder="e.g. Chennai, Ooty">
        </div>
      </div>

      <div class="form-group">
        <label for="message">Additional Message</label>
        <textarea id="message" name="message" placeholder="Any specific ideas, themes or locations?"></textarea>
      </div>

      <div class="btn-wrap">
        <button type="submit" class="book-btn">Submit Booking</button>
      </div>

    </form>
  </section>

  <script>
    document.getElementById('name').value=localStorage.getItem("userName");
    document.getElementById("email").value=localStorage.getItem("userEmail");
    document.getElementById("phone").value=localStorage.getItem("userPhone");
    function submitForm(e) {
      e.preventDefault();
      const customerName=document.getElementById("name").value;
      const email=document.getElementById("email").value;
      const phone=document.getElementById("phone").value;
      const eventType=document.getElementById("session").value;
      const eventDate=document.getElementById("date").value;
      const eventLocation=document.getElementById("location").value;
      const message=document.getElementById("message").value;
     
    console.log(customerName);
    console.log(email);
    console.log(phone);
    console.log(eventType);
    console.log(eventDate);
    console.log(eventLocation);
    console.log(message);
      
    }
  </script>
</body>
</html>
